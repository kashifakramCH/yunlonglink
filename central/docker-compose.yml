services:

  api:
    build: .
    container_name: vpn-api
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/yunlonglink.db
    volumes:
      - vpn-data:/app/data
    expose:
      - "8000"
    networks:
      - vpn-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: vpn-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - vpn-net

  certbot:
    image: certbot/certbot
    container_name: vpn-certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Auto-renew every 12 hours
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

  quota-cron:
    build: .
    container_name: vpn-quota-cron
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/yunlonglink.db
    volumes:
      - vpn-data:/app/data
    networks:
      - vpn-net
    # Check for expired packages every hour
    command: >
      sh -c "while true; do
        python -c \"
from database import SessionLocal
from controller import check_all_expiries
db = SessionLocal()
check_all_expiries(db)
db.close()
print('Quota expiry check complete')
\";
        sleep 3600;
      done"

volumes:
  vpn-data:
  certbot-certs:
  certbot-www:

networks:
  vpn-net:
    driver: bridge
