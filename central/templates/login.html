<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YunLongLink — Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body {
      min-height: 100vh; background: #0f1117;
      display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      width: 100%; max-width: 420px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 1rem; padding: 2.5rem;
    }
    .brand { font-size: 1.5rem; font-weight: 700; color: #58a6ff; }
    .brand span { color: #e6edf3; }
    .form-control {
      background: #0d1117; border-color: #30363d; color: #e6edf3;
    }
    .form-control:focus {
      background: #0d1117; border-color: #58a6ff; color: #e6edf3;
      box-shadow: 0 0 0 .2rem rgba(88,166,255,.15);
    }
    .form-control::placeholder { color: #484f58; }
    .btn-login {
      background: #238636; border-color: #238636; color: #fff;
      width: 100%; padding: .6rem;
    }
    .btn-login:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="brand mb-1">YunLong<span>Link</span></div>
      <div class="text-secondary" style="font-size:.85rem;">Admin Panel</div>
    </div>

    {% if error %}
    <div class="alert alert-danger py-2 mb-3" style="font-size:.875rem;">
      <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/ui/login">
      <div class="mb-3">
        <label class="form-label text-secondary" style="font-size:.8rem;">ADMIN PASSWORD</label>
        <input
          type="password"
          name="password"
          class="form-control"
          placeholder="Enter admin password"
          autofocus
          required
        >
      </div>
      <button type="submit" class="btn btn-login mt-1">
        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
      </button>
    </form>
  </div>
</body>
</html>
