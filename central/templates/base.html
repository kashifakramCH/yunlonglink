<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}YunLongLink Admin{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { min-height: 100vh; background: #0f1117; }

    .sidebar {
      position: fixed; top: 0; left: 0; height: 100vh;
      width: 240px; background: #161b22; border-right: 1px solid #30363d;
      display: flex; flex-direction: column; z-index: 100;
    }
    .sidebar-brand {
      padding: 1.25rem 1.5rem; border-bottom: 1px solid #30363d;
      font-size: 1.1rem; font-weight: 700; letter-spacing: .5px;
      color: #58a6ff; text-decoration: none;
    }
    .sidebar-brand span { color: #e6edf3; }
    .sidebar-nav { flex: 1; padding: 1rem 0; }
    .sidebar-nav .nav-link {
      color: #8b949e; padding: .6rem 1.5rem;
      display: flex; align-items: center; gap: .6rem;
      border-radius: 0; font-size: .92rem; transition: all .15s;
    }
    .sidebar-nav .nav-link:hover, .sidebar-nav .nav-link.active {
      color: #e6edf3; background: #21262d;
    }
    .sidebar-nav .nav-link.active { border-left: 3px solid #58a6ff; }
    .sidebar-nav .nav-link i { font-size: 1rem; width: 1.25rem; }
    .sidebar-footer {
      padding: 1rem 1.5rem; border-top: 1px solid #30363d;
    }

    .main-content { margin-left: 240px; padding: 2rem; min-height: 100vh; }

    .stat-card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: .75rem; padding: 1.5rem;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: #58a6ff; }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: #e6edf3; }
    .stat-card .stat-label { font-size: .8rem; color: #8b949e; text-transform: uppercase; letter-spacing: .5px; }
    .stat-card .stat-icon { font-size: 1.5rem; opacity: .6; }

    .table { --bs-table-bg: transparent; }
    .table th { color: #8b949e; font-size: .75rem; text-transform: uppercase; letter-spacing: .5px; border-color: #30363d; }
    .table td { border-color: #21262d; vertical-align: middle; }
    .table tbody tr:hover td { background: #161b22; }

    .card { background: #161b22; border-color: #30363d; }
    .modal-content { background: #161b22; border-color: #30363d; }
    .modal-header { border-color: #30363d; }
    .modal-footer { border-color: #30363d; }
    .form-control, .form-select {
      background: #0d1117; border-color: #30363d; color: #e6edf3;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; border-color: #58a6ff; color: #e6edf3; box-shadow: 0 0 0 .2rem rgba(88,166,255,.15);
    }
    .form-control::placeholder { color: #484f58; }
    .btn-primary { background: #238636; border-color: #238636; }
    .btn-primary:hover { background: #2ea043; border-color: #2ea043; }

    .badge-active   { background: rgba(46,160,67,.2);  color: #3fb950; border: 1px solid rgba(46,160,67,.4); }
    .badge-blocked  { background: rgba(248,81,73,.2);  color: #f85149; border: 1px solid rgba(248,81,73,.4); }
    .badge-pending  { background: rgba(210,153,34,.2); color: #d29922; border: 1px solid rgba(210,153,34,.4); }
    .badge-suspended { background: rgba(139,148,158,.2); color: #8b949e; border: 1px solid rgba(139,148,158,.4); }

    .progress { height: 6px; background: #21262d; }
    .progress-bar { background: #238636; border-radius: 3px; }
    .progress-bar.bg-warning { background: #d29922 !important; }
    .progress-bar.bg-danger  { background: #f85149 !important; }
  </style>
</head>
<body>

<div class="sidebar">
  <a class="sidebar-brand" href="/ui/dashboard">YunLong<span>Link</span></a>
  <nav class="sidebar-nav">
    <a href="/ui/dashboard" class="nav-link {% if active_page == 'dashboard' %}active{% endif %}">
      <i class="bi bi-speedometer2"></i> Dashboard
    </a>
    <a href="/ui/users" class="nav-link {% if active_page == 'users' %}active{% endif %}">
      <i class="bi bi-people"></i> Users
    </a>
    <a href="/ui/packages" class="nav-link {% if active_page == 'packages' %}active{% endif %}">
      <i class="bi bi-box-seam"></i> Packages
    </a>
    <a href="/ui/nodes" class="nav-link {% if active_page == 'nodes' %}active{% endif %}">
      <i class="bi bi-hdd-network"></i> Nodes
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="/ui/logout" class="nav-link text-danger" style="padding:0;">
      <i class="bi bi-box-arrow-left"></i> Logout
    </a>
  </div>
</div>

<div class="main-content">
  {% if flash %}
  <div class="alert alert-{{ flash.category }} alert-dismissible fade show mb-4" role="alert">
    {{ flash.message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
